<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EXOTICA – NIT</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ff0055;
            --secondary-color: #00d4ff;
            --accent-color: #ccff00;
            --dark-bg: #050505;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #ffffff;
            --neon-glow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
        }

        body {
            background: linear-gradient(-45deg, #0a0a0a, #1a0b2e, #001f3f, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Playfair Display', serif;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(to right, #fff, var(--secondary-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            background-size: 200% auto;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .nav-link {
            color: var(--text-light) !important;
            font-weight: 600;
            margin-left: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;
            text-shadow: var(--neon-glow);
            transform: scale(1.1);
        }

        .btn-glow {
            background: transparent;
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 2px solid var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .btn-glow:hover::before {
            width: 100%;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Page Header */
        .page-header {
            padding: 8rem 0 4rem;
            background: radial-gradient(circle at top, rgba(255, 0, 85, 0.1), transparent 50%);
            text-align: center;
            animation: pulseHeader 4s infinite alternate;
        }

        @keyframes pulseHeader {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1;
            }
        }

        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Form Section */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }

        .form-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary-color);
        }

        .form-control,
        .form-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--secondary-color);
            color: var(--text-light);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            transform: scale(1.01);
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.8);
            padding: 4rem 0;
            border-top: 1px solid var(--glass-border);
            margin-top: 5rem;
            backdrop-filter: blur(10px);
        }

        .social-icon {
            color: var(--text-light);
            font-size: 1.5rem;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color);
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">EXOTICA <span style="color: white; font-weight: 300;">|
                    NIT</span></a>
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="mr-miss-nit.html">Mr. & Miss NIT</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn-glow" href="registration.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title">Register Now</h1>
            <p class="lead text-muted">Join the revolution. Secure your spot.</p>
        </div>
    </header>

    <!-- Registration Form -->
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form id="registrationForm" onsubmit="handleRegister(event)">
                        <div class="row g-4">
                            <!-- Personal Details -->
                            <div class="col-md-6">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" required>
                                    <option value="" selected disabled>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="branch" class="form-label">Branch</label>
                                <input type="text" class="form-control" id="branch" placeholder="e.g., CSE, ECE"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label for="year" class="form-label">Year</label>
                                <select class="form-select" id="year" required>
                                    <option value="" selected disabled>Select Year</option>
                                    <option value="1">1st Year</option>
                                    <option value="2">2nd Year</option>
                                    <option value="3">3rd Year</option>
                                    <option value="4">4th Year</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>

                            <!-- Event Selection -->
                            <div class="col-12">
                                <label for="event" class="form-label">Select Event</label>
                                <select class="form-select" id="event" required onchange="toggleTeamDetails()">
                                    <option value="" selected disabled>Choose an event...</option>
                                    <optgroup label="Coding">
                                        <option value="Code War (Male)">Code War (Male)</option>
                                        <option value="Code War (Female)">Code War (Female)</option>
                                    </optgroup>
                                    <optgroup label="Sports">
                                        <option value="Cricket">Cricket</option>
                                        <option value="Volleyball">Volleyball</option>
                                        <option value="Kabaddi">Kabaddi</option>
                                        <option value="Kho-Kho">Kho-Kho</option>
                                        <option value="Badminton">Badminton</option>
                                    </optgroup>
                                    <optgroup label="Cultural">
                                        <option value="Dance">Dance Competition</option>
                                        <option value="Singing">Singing Competition</option>
                                        <option value="Drama">Drama</option>
                                        <option value="Fashion Show">Fashion Show</option>
                                        <option value="Photography">Photography</option>
                                    </optgroup>
                                </select>
                            </div>

                            <!-- Team Details (Hidden by default) -->
                            <div class="col-12" id="teamSection" style="display: none;">
                                <label for="teamMembers" class="form-label">Team Members (Names & IDs)</label>
                                <textarea class="form-control" id="teamMembers" rows="3"
                                    placeholder="Enter details of other team members..."></textarea>
                            </div>

                            <!-- File Upload -->
                            <div class="col-12">
                                <label for="photo" class="form-label">Upload ID Card / Photo</label>
                                <input type="file" class="form-control" id="photo" accept="image/*" required>
                            </div>

                            <!-- Submit -->
                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn-glow w-100 py-3" style="font-size: 1.1rem;">Complete
                                    Registration</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <h4 class="mb-3" style="font-family: 'Playfair Display', serif;">EXOTICA – NIT</h4>
            <p class="text-muted mb-4">The biggest annual fest of Nalanda Institute of Technology.</p>
            <div class="mb-4">
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="small text-muted mb-0">&copy; 2025 EXOTICA NIT. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script>
        function toggleTeamDetails() {
            const event = document.getElementById('event').value;
            const teamEvents = ['Cricket', 'Volleyball', 'Kabaddi', 'Kho-Kho', 'Badminton', 'Drama', 'Fashion Show'];
            const teamSection = document.getElementById('teamSection');

            if (teamEvents.includes(event) || event.includes('Group')) {
                teamSection.style.display = 'block';
            } else {
                teamSection.style.display = 'none';
            }
        }

        function handleRegister(e) {
            e.preventDefault();

            // Generate Participant ID
            const branch = document.getElementById('branch').value.toUpperCase().substring(0, 3);
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const participantID = `EXO-${branch}-${randomNum}`;

            // Mock Success
            alert(`Registration Successful!\n\nYour Participant ID is: ${participantID}\n\nA confirmation email has been sent to your registered email address.`);

            // Reset Form
            document.getElementById('registrationForm').reset();
            document.getElementById('teamSection').style.display = 'none';
        }
    </script>
</body>

</html>
